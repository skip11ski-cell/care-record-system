# Render Blueprint（インフラをコードで定義）
# https://render.com/docs/infrastructure-as-code
#
# 適用後、ダッシュボードの Environment で
# LINE_CHANNEL_SECRET / LINE_CHANNEL_ACCESS_TOKEN / GEMINI_API_KEY 等を入力（sync: false）。

services:
  - type: web
    name: kaigo-line-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kaigo-postgres
          property: connectionString
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false

databases:
  - name: kaigo-postgres
    databaseName: kaigo_records
    user: kaigo
