services:
  - type: web
    name: care-record-system
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MANAGER_PHONE
        sync: false
      - key: NURSE_PHONE
        sync: false
      - key: PORT
        value: "10000"
